name: CI

on:
  workflow_call:
  push:
    branches-ignore:
      - master
      - production
  pull_request:
    branches-ignore:
      - master
      - production

env:
  HUGO_VERSION: 0.157.0

jobs:
  lint-test:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build
        run: hugo --gc --minify

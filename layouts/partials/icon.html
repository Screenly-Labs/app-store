{{- /* Icon by name, rendered from the Lucide kit (@iconify-json/lucide) as a
       CSS-mask <span>: 1em square, inherits currentColor. Every icon on the site
       comes from this one kit. The full class literals below are what Tailwind
       compiles, so register any new icon here rather than inlining an <svg>. */ -}}
{{- $icons := dict
  "github" "icon-[lucide--github]"
  "linkedin" "icon-[lucide--linkedin]"
  "clipboard" "icon-[lucide--clipboard]"
  "arrow-up" "icon-[lucide--arrow-up]"
  "arrow-right" "icon-[lucide--arrow-right]"
  "external-link" "icon-[lucide--external-link]"
  "x" "icon-[lucide--x]"
-}}
{{- with index $icons . -}}<span class="{{ . }}" aria-hidden="true"></span>{{- end -}}

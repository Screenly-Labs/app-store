<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ if .IsHome }}{{ .Site.Title }} for Any Screen{{ else }}{{ (partial "app-meta.html" .).title }} - {{ .Site.Title }}{{ end }}</title>

        <link rel="preload" as="font" type="font/woff2" href="{{ "fonts/space-grotesk/space-grotesk-latin-700-normal.woff2" | relURL }}" crossorigin>

        {{ partial "seo.html" . }}

        <link rel="icon" href="{{ "favicon.ico" | relURL }}" sizes="any">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
        <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16x16.png" | relURL }}">
        <link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}">
        <link rel="mask-icon" href="{{ "safari-pinned-tab.svg" | relURL }}" color="#7a5af8">
        <link rel="manifest" href="{{ "site.webmanifest" | relURL }}">
        <meta name="msapplication-config" content="{{ "browserconfig.xml" | relURL }}">
        <meta name="msapplication-TileColor" content="#0c0a14">
        <meta name="theme-color" content="#0c0a14">

        <!-- Site styles (Tailwind, compiled by Hugo via PostCSS) -->
        {{ $opts := dict "config" "postcss.config.js" }}
        {{ $css := resources.Get "css/app.css" | css.PostCSS $opts | minify | fingerprint }}
        <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
    </head>

    <body class="{{ .Params.bodyclass }}">
